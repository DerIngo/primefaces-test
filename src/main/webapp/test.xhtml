<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://xmlns.jcp.org/jsf/core"
	xmlns:pt="http://xmlns.jcp.org/jsf/passthrough"
	xmlns:jsf="http://xmlns.jcp.org/jsf"
	xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
	xmlns:p="http://primefaces.org/ui">

    <h:head>
        <title>PrimeFaces Test</title>
        <h:outputScript name="test.js" />
        <h:outputStylesheet name="test.css" />
    </h:head>
    <h:body>

      <h1>#{testView.string}</h1>
      <p:messages><p:autoUpdate/></p:messages>
      <h:form id="frmTest">
        <p:dataTable value="#{testView.list}" var="item" editable="true" editMode="cell">
          <p:column width="100" headerText="Name">
            <p:cellEditor>
              <f:facet name="output">
                <h:outputText value="Name: #{item.name}" />
              </f:facet>
              <f:facet name="input">
                <p:inputText value="#{item.name}" required="true"></p:inputText>
              </f:facet>
            </p:cellEditor>
          </p:column>
        </p:dataTable>
        <p:commandButton value="Test" action="#{testView.action}" />
      </h:form>
      <br/>
      <p>
        The Name of the last book is NULL.<br/>
        The inputText has required="true" attribute.<br/>
        But you can click the Test-button and the action is executed.<br/>
        I expected validation to fail BEFORE the action method of the commandButton is executed.
      </p>
    </h:body>
</html>
